<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ 2026 BC World Cup Office Pool</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, #0f4c3a, #1a3c2e); color: white; }
    header { background: #0a2f24; padding: 20px; text-align: center; }
    h1 { margin: 0; font-size: 2.5em; }
    .container { max-width: 1200px; margin: 20px auto; padding: 20px; }
    table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.2); }
    th { background: #1a3c2e; }
    .leaderboard tr:hover { background: rgba(255,255,255,0.15); }
    .card { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin: 15px 0; }
    button { background: #00c853; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    button:hover { background: #00b140; }
    .flag { font-size: 1.4em; margin-right: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>⚽ 2026 FIFA World Cup Office Pool</h1>
  </header>

  <div class="container">
    <!-- Rules -->
    <div class="card">
      <h2>📜 Scoring Rules</h2>
      <div class="rules">
        <strong>Super Simple:</strong><br>
        • <strong>+3</strong> = Win in regular or extra time<br>
        • <strong>+2</strong> = Win via penalty shootout<br>
        • <strong>+1</strong> = Draw<br>
        • <strong>0</strong> = Loss
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="card">
      <h2>🏆 Current Leaderboard</h2>
      <table id="leaderboard">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Participant</th>
            <th>Teams</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>

    <!-- Assignments -->
    <div class="card">
      <h2>📋 All Assignments</h2>
      <table id="assignments">
        <thead>
          <tr>
            <th>Participant</th>
            <th>Teams</th>
          </tr>
        </thead>
        <tbody id="assignments-body"></tbody>
      </table>
    </div>

    <!-- Score Updater -->
    <div class="card">
      <h2>🔄 Update Scores</h2>
      <select id="player-select" style="padding:10px; margin-right:10px; width:460px;"></select>
      <input type="number" id="points" placeholder="Points to add" style="padding:10px; width:130px;">
      <button onclick="addPoints()">Add Points</button>
      <button onclick="resetPool()" style="background:#f44336; margin-left:10px;">Reset All</button>
    </div>
  </div>

  <script>
    const assignments = [
      { id: 1, player: "Ryan M", teams: "🇧🇪 Belgium" },
      { id: 2, player: "Chris M", teams: "🇵🇾 Paraguay & 🇨🇦 Canada" },
      { id: 3, player: "Jazmin P", teams: " Scotland & 🇩🇿 Algeria" },
      { id: 4, player: "Alison M", teams: "🇨🇴 Colombia & 🇭🇹 Haiti" },
      { id: 5, player: "Sean M", teams: "🇲🇦 Morocco" },
      { id: 6, player: "Andrew L", teams: "🇰🇷 South Korea & 🇨🇩 DR Congo" },
      { id: 7, player: "Sam W", teams: "🇺🇸 USA & 🇨🇻 Cape Verde" },
      { id: 8, player: "Jordan V", teams: "🇵🇹 Portugal" },
      { id: 9, player: "Justin K", teams: "🇳🇱 Netherlands" },
      { id: 10, player: "Ivy D", teams: "🇯🇵 Japan & 🇯🇴 Jordan" },
      { id: 11, player: "Greg P", teams: "🇪🇨 Ecuador & 🇶🇦 Qatar" },
      { id: 12, player: "Michael C", teams: "🇨🇭 Switzerland & 🇸🇦 Saudi Arabia" },
      { id: 13, player: "Tyler B", teams: "🇪🇬 Egypt & 🇨🇿 Czechia" },
      { id: 14, player: "Ryan L", teams: "🇦🇹 Austria & 🇺🇿 Uzbekistan" },
      { id: 15, player: "Jake B", teams: "🇧🇷 Brazil" },
      { id: 16, player: "Kyle K", teams: "🇺🇾 Uruguay & 🇧🇦 Bosnia and Herzegovina" },
      { id: 17, player: "Gloria B", teams: "🇸🇳 Senegal & 🇨🇼 Curacao" },
      { id: 18, player: "Ryan A", teams: "🇲🇽 Mexico & 🇬🇭 Ghana" },
      { id: 19, player: "Tony V", teams: "🇪🇸 Spain" },
      { id: 20, player: "Cole V", teams: "🇦🇺 Australia & 🇹🇳 Tunisia" },
      { id: 21, player: "George L", teams: "🇵🇦 Panama & 🇨🇮 Ivory Coast" },
      { id: 22, player: "Adam Z", teams: "🇹🇷 Turkey & 🇮🇶 Iraq" },
      { id: 23, player: "Stacy M", teams: "🇩🇪 Germany" },
      { id: 24, player: "Michael R", teams: "🇳🇴 Norway & 🇸🇪 Sweden" },
      { id: 25, player: "Ana O", teams: "🇦🇷 Argentina" },
      { id: 26, player: "Daniel L", teams: "🇫🇷 France" },
      { id: 27, player: "Ivan S", teams: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England" },
      { id: 28, player: "JG", teams: "🇮🇷 Iran & 🇿🇦 South Africa" },
      { id: 29, player: "Sam F", teams: "🇭🇷 Croatia & 🇳🇿 New Zealand" }
    ];

    let scores = {};

    function loadData() {
      const saved = localStorage.getItem('worldCupPool2026');
      if (saved) scores = JSON.parse(saved);
      else assignments.forEach(a => scores[a.id] = { points: 0 });
      renderAll();
    }

    function saveData() {
      localStorage.setItem('worldCupPool2026', JSON.stringify(scores));
    }

    function renderAll() {
      renderLeaderboard();
      renderAssignments();
      renderPlayerSelect();
    }

    function renderLeaderboard() {
      const tbody = document.getElementById('leaderboard-body');
      tbody.innerHTML = '';
      const sorted = assignments.map(a => ({
        ...a,
        points: scores[a.id]?.points || 0
      })).sort((a, b) => b.points - a.points);

      sorted.forEach((item, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${i+1}</strong></td>
          <td>${item.player}</td>
          <td>${item.teams}</td>
          <td><strong>${item.points}</strong></td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderAssignments() {
      const tbody = document.getElementById('assignments-body');
      tbody.innerHTML = '';
      assignments.forEach(a => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${a.player}</td><td>${a.teams}</td>`;
        tbody.appendChild(row);
      });
    }

    function renderPlayerSelect() {
      const select = document.getElementById('player-select');
      select.innerHTML = '<option value="">Select Participant</option>';
      assignments.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = `${a.player} — ${a.teams}`;
        select.appendChild(opt);
      });
    }

    window.addPoints = function() {
      const id = parseInt(document.getElementById('player-select').value);
      const pts = parseInt(document.getElementById('points').value);
      if (!id || isNaN(pts)) {
        alert("Please select a participant and enter points");
        return;
      }
      if (!scores[id]) scores[id] = { points: 0 };
      scores[id].points += pts;
      saveData();
      renderAll();
      alert(`Added ${pts} points to ${assignments.find(a => a.id === id).player}!`);
    };

    window.resetPool = function() {
      if (confirm("Reset all scores?")) {
        scores = {};
        saveData();
        renderAll();
      }
    };

    loadData();
  </script>
</body>
</html>
